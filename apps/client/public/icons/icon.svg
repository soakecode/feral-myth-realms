<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="gem" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff7cc"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </radialGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="92" ry="92"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Outer rune ring -->
    <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(255,215,0,0.7)" stroke-width="13"/>
    <!-- Inner ring -->
    <circle cx="256" cy="256" r="167" fill="none" stroke="rgba(255,215,0,0.25)" stroke-width="6"/>

    <!-- 6-point rune lines -->
    <g stroke="rgba(255,215,0,0.55)" stroke-width="9" stroke-linecap="round">
      <line x1="256" y1="205" x2="256" y2="72"/>
      <line x1="302" y1="229" x2="415" y2="162"/>
      <line x1="302" y1="283" x2="415" y2="350"/>
      <line x1="256" y1="307" x2="256" y2="440"/>
      <line x1="210" y1="283" x2="97" y2="350"/>
      <line x1="210" y1="229" x2="97" y2="162"/>
    </g>

    <!-- Center gem -->
    <circle cx="256" cy="256" r="52" fill="url(#gem)"/>
    <circle cx="256" cy="256" r="52" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

    <!-- Paw prints (brand mark) -->
    <circle cx="133" cy="338" r="19" fill="rgba(255,111,0,0.85)"/>
    <circle cx="256" cy="368" r="19" fill="rgba(255,111,0,0.85)"/>
    <circle cx="379" cy="338" r="19" fill="rgba(255,111,0,0.85)"/>
    <circle cx="77" cy="282" r="16" fill="rgba(255,111,0,0.7)"/>
    <circle cx="435" cy="282" r="16" fill="rgba(255,111,0,0.7)"/>

    <!-- FMR text -->
    <text x="256" y="195" text-anchor="middle" dominant-baseline="middle"
      font-family="Arial, sans-serif" font-size="62" font-weight="900"
      fill="rgba(255,255,255,0.92)" letter-spacing="2">FMR</text>
  </g>
</svg>
